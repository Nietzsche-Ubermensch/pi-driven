name: Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_run:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    name: Auto-merge on CI success
    runs-on: ubuntu-latest
    if: github.actor == 'Nietzsche-Ubermensch'
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = context.payload.pull_request?.number || context.payload.check_run?.pull_requests?.[0]?.number;
            if (!pr_number) return;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });

            if (pr.draft || pr.merged || pr.base.ref !== pr.base.repo.default_branch) return;

            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });

            const allChecks = checks.check_runs;
            if (allChecks.length === 0) return;

            const allComplete = allChecks.every(c => c.status === 'completed');
            const allSuccess = allComplete && allChecks.every(c => c.conclusion === 'success' || c.conclusion === 'skipped');

            if (allSuccess) {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: `${pr.title} (#${pr.number})`
              });
              core.info(`PR #${pr.number} auto-merged`);
            }
