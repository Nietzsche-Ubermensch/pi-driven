name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  detect-and-test:
    name: Detect & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f "package.json" ] || [ -f "server/package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            echo "type=python" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then
            echo "type=go" >> $GITHUB_OUTPUT
          elif [ -f "Cargo.toml" ]; then
            echo "type=rust" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.detect.outputs.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node install & test
        if: steps.detect.outputs.type == 'node'
        run: |
          if [ -f "server/package.json" ]; then cd server; fi
          npm ci || npm install
          npm test 2>/dev/null || echo "No test script found"
          npx tsc --noEmit 2>/dev/null || true
        continue-on-error: true

      - name: Setup Python
        if: steps.detect.outputs.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python install & test
        if: steps.detect.outputs.type == 'python'
        run: |
          pip install -e . 2>/dev/null || pip install -r requirements.txt 2>/dev/null || true
          pip install pytest 2>/dev/null || true
          python -m pytest 2>/dev/null || echo "No tests found"
        continue-on-error: true

      - name: Go test
        if: steps.detect.outputs.type == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./... 2>/dev/null || echo "No Go tests"
        if: steps.detect.outputs.type == 'go'
        continue-on-error: true

      - name: Rust test
        if: steps.detect.outputs.type == 'rust'
        run: cargo test 2>/dev/null || echo "No Rust tests"
        continue-on-error: true
