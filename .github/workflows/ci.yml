name: CI — Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Packages
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      api: ${{ steps.filter.outputs.api }}
      cli: ${{ steps.filter.outputs.cli }}
      pipeline: ${{ steps.filter.outputs.pipeline }}
      security: ${{ steps.filter.outputs.security }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core: packages/core/**
            api: packages/api/**
            cli: packages/cli/**
            pipeline: packages/pipeline/**
            security: packages/security/**

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "npm" }
      - run: npm ci
      - run: npx biome check . --max-diagnostics=50 || true

  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 10
    strategy:
      matrix:
        package: [core, api, cli]
    if: ${{ needs.detect-changes.outputs[matrix.package] == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "npm" }
      - run: npm ci
      - run: npx tsc -p packages/${{ matrix.package }}/tsconfig.json --noEmit --skipLibCheck

  test:
    name: Test (${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 15
    strategy:
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ matrix.node }}", cache: "npm" }
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.node }}
          path: coverage/
